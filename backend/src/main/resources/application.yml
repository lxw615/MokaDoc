spring:
  application:
    name: MokaDoc
  profiles:
    active: local
  # 排除 LangChain4j 的 AI Service 自动配置（项目通过 AiServiceFactory 手动管理）
  autoconfigure:
    exclude:
      - dev.langchain4j.spring.LangChain4jAutoConfig
  # ? ???? Session
  session:
    redis:
      # ??????JSON
      serializer: json
      flush-mode: on-save
    # session 30 ???
    timeout: 2592000
  # MySQL ???????????
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mokaDoc
    username: root
    password: 114514
  # Redis ????????
  data:
    redis:
      host: localhost
      port: 6379
      database: 4
      password:
      ttl: 3600
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000


# springdoc-openapi ??
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.kanade.backend.controller

# 文件上传配置
file:
  upload:
    dir: ./uploads/documents

langchain4j:
  community:
    redis:
      host: localhost
      port: 6379

# Elasticsearch 向量存储配置
elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  index-name: rag_documents

# RAG 进阶优化配置
rag:
  query-transformation:
    enabled: true
    type: multi_strategy          # compress | expand | multi_strategy
  routing:
    enabled: true
  reranking:
    enabled: true
    model: rrf              # rrf（内置免费）
    top-k: 5
  injection:
    template: standard      # standard | concise | analytical
  es:
    max-results: 10
    min-score: 0.75
